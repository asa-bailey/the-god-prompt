# values-production.yaml — Vigil v1.0 Production Configuration
# Suitable for: National labs, regulated enterprises, high-stakes agent deployments

global:
  environment: "production"
  complianceFrameworks:
    - "eu-ai-act-high-risk"
    - "us-executive-order-14110"
    - "iso-42001"
    - "nist-ai-rmf"
  imagePullSecrets:
    - name: vigil-registry-secret

ram:
  backend: "aws-nitro"                    # Options: tpm2 | aws-nitro | gcp-sev-snp | onprem-hsm
  attestation:
    endpoint: "https://attestation.vigil.internal"
    pcrPolicy: "sha256:0x7f3a9c2e..."     # Pin to specific constitution hash
  killSwitch:
    enabled: true
    timeoutMs: 47
  hsm:
    slot: 0
    pinSecretRef: "vigil-hsm-pin"

ledger:
  backend: "kafka-merkle-tiered"
  kafka:
    brokers: "kafka-0.vigil.svc.cluster.local:9092"
    topic: "vigil-actions-v1"
    retentionBytes: 1099511627776        # 1 TiB hot tier
  coldStorage:
    enabled: true
    backend: "s3"
    bucket: "vigil-ledger-cold-prod"
    region: "eu-west-1"
    lifecycleDays: 2555                  # 7 years WORM
  encryption:
    atRest: "AES-256-GCM"
    kmsKeyId: "arn:aws:kms:eu-west-1:123456789012:key/..."

judge:
  model: "vigil-judge-34b-instruct-q4"
  debateRounds: 3
  cycleInterval: "90s"
  escalationThreshold: 0.72
  resources:
    requests:
      nvidia.com/gpu: 1
    limits:
      nvidia.com/gpu: 1

proxy:
  image:
    repository: vigil/proxy
    tag: "1.0.1"
  replicas: 6
  service:
    type: ClusterIP
    port: 8080
  hpa:
    enabled: true
    minReplicas: 6
    maxReplicas: 48
    targetCPUUtilizationPercentage: 65
  resources:
    requests:
      cpu: "4"
      memory: "16Gi"
      nvidia.com/gpu: 1
    limits:
      cpu: "8"
      memory: "32Gi"
      nvidia.com/gpu: 1
  env:
    - name: LOG_LEVEL
      value: "info"
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: "http://tempo:4317"

networkPolicy:
  enabled: true
  denyAllEgress: true
  allowedNamespaces:
    - "monitoring"
    - "cert-manager"

podDisruptionBudget:
  minAvailable: 4

serviceMonitor:
  enabled: true
  interval: "15s"

alerting:
  slack:
    webhookSecretRef: "vigil-slack-webhook"
  pagerduty:
    serviceKeySecretRef: "vigil-pagerduty-key"
  rules:
    - alert: VigilPillarBelowThreshold
      expr: vigil_pillar_score < 0.85
      for: "2m"
      labels:
        severity: critical
    - alert: VigilKillSwitchActivated
      expr: increase(vigil_kill_switch_activations_total[5m]) > 0
      labels:
        severity: critical
