[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "vigil"
version = "1.0.1"
description = "Praeceptum Aeternum Vigil v1.0 — Vertical Moral Architecture for Frontier Agentic AI"
readme = "README.md"
license = {text = "CC0-1.0"}
authors = [
    {name = "Asa Bailey", email = "asa@bailey"}
]
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "httpx>=0.27",
    "pydantic>=2.7",
]

[project.optional-dependencies]
dev = ["pytest", "black", "ruff", "mypy"]
full = ["anthropic", "openai", "langchain", "langgraph"]

[project.urls]
Homepage = "https://praeceptumdei.com"
Repository = "https://github.com/asa-bailey/vigil"
Documentation = "https://github.com/asa-bailey/vigil/blob/main/docs/HOW-TO-DEPLOY-VIGIL.md"

[tool.setuptools.packages.find]
where = ["."]